# ─────────────────────────────────────────────────────────────────────────────
# Configuración BASE del microservicio administracion (desarrollo local).
# En producción usar application-prod.yml con variables de entorno.
# ─────────────────────────────────────────────────────────────────────────────

server:
  port: ${SERVER_PORT:9090}
  tomcat:
    threads:
      max: ${TOMCAT_MAX_THREADS:200}
      min-spare: ${TOMCAT_MIN_SPARE_THREADS:20}
    connection-timeout: 20000
    accept-count: 100

spring:
  application:
    name: administracion
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://181.204.144.6:8013/SGDEA_SUPERADMIN}
    username: ${SPRING_DATASOURCE_USERNAME:juliana_solano}
    password: ${SPRING_DATASOURCE_PASSWORD:Ju1i4n42026**}
    hikari:
      # Pool pequeño para desarrollo local
      maximum-pool-size: ${HIKARI_POOL_SIZE:10}
      minimum-idle: ${HIKARI_POOL_SIZE:10}
      connection-timeout: 20000
      validation-timeout: 5000
      max-lifetime: 1800000              # 30 min
      idle-timeout: 600000               # 10 min
      keepalive-time: 60000              # Ping cada 60 s
      leak-detection-threshold: ${HIKARI_LEAK_THRESHOLD:15000}  # 15 s en dev
      pool-name: AdministracionHikariPool

  jpa:
    open-in-view: false
    hibernate:
      # update solo en dev local; en prod usar validate (ver application-prod.yml)
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    root: INFO
    com.sgdea: DEBUG

# ─────────────────────────────────────────────────────────────────────────────
# Actuator + Micrometer/Prometheus — configuración base (dev)
# En producción sobreescribir con application-prod.yml.
# ─────────────────────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      # En dev exponemos todos los endpoints útiles para depuración.
      # En prod limitar a: health,info,prometheus  (ver application-prod.yml)
      exposure:
        include: health,info,prometheus,metrics,env,beans,loggers,httptrace
      base-path: /actuator
  endpoint:
    health:
      show-details: always          # En prod → when-authorized
    prometheus:
      enabled: true
  metrics:
    tags:
      # Etiqueta global: identifica el servicio en Prometheus/Grafana.
      # Aparece en TODAS las métricas como: application="administracion"
      application: ${spring.application.name}
    distribution:
      # Percentiles para latencia HTTP (p50, p95, p99) visibles en Grafana
      percentiles-histogram:
        http.server.requests: true
      percentiles:
        http.server.requests: 0.5,0.95,0.99

