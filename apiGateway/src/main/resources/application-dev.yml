server:
  port: 8080

spring:
  # ── Docker Compose — habilitado SOLO en dev con ruta explícita ──────────────
  # La ruta es relativa al directorio de trabajo. Cuando se ejecuta desde IntelliJ
  # o con 'mvnw spring-boot:run' dentro de apiGateway/, la ruta es correcta.
  docker:
    compose:
      # Docker Compose está DESHABILITADO por defecto para que la app arranque
      # aunque Docker Desktop no esté corriendo.
      #
      # Para habilitar (requiere Docker Desktop activo):
      #   - Variable de entorno: SPRING_DOCKER_COMPOSE_ENABLED=true
      #   - O en IntelliJ: Edit Configurations → Environment variables
      enabled: ${SPRING_DOCKER_COMPOSE_ENABLED:false}
      # Ruta relativa al CWD del proceso.
      # CWD = raíz del proyecto (sgdea/)  → apiGateway/compose.yaml ✓
      # CWD = módulo (apiGateway/)        → sobreescribir con COMPOSE_FILE=compose.yaml
      file: ${COMPOSE_FILE:apiGateway/compose.yaml}

  # ── Redis local — migrado a spring.data.redis.* (Spring Boot 3.x) ──────────
  data:
    redis:
      host: localhost
      port: 6379

  cloud:
    gateway:
      server:
        webflux:
          routes:
            # ── Administración ──────────────────────────────────────────────────
            - id: administracion
              uri: http://localhost:9090
              predicates:
                - Path=/administracion/**
              filters:
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: 20
                    redis-rate-limiter.burstCapacity: 40
                    redis-rate-limiter.requestedTokens: 1

            - id: administracion-graphql
              uri: http://localhost:9090
              predicates:
                - Path=/graphql
              filters:
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: 20
                    redis-rate-limiter.burstCapacity: 40
                    redis-rate-limiter.requestedTokens: 1

            # ── Multitenancy — Auth (rutas públicas) ────────────────────────────
            - id: multitenancy-auth
              uri: http://localhost:8081
              predicates:
                - Path=/multitenancy/auth/**
              filters:
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: 5
                    redis-rate-limiter.burstCapacity: 10
                    redis-rate-limiter.requestedTokens: 1

            # ── Multitenancy — API (rutas protegidas) ───────────────────────────
            - id: multitenancy
              uri: http://localhost:8081
              predicates:
                - Path=/multitenancy/**
              filters:
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: 20
                    redis-rate-limiter.burstCapacity: 40
                    redis-rate-limiter.requestedTokens: 1

logging:
  level:
    root: DEBUG
    com.sgdea: DEBUG

# ---------------------------------------------------------------------------
# Notas:
# - Configuración exclusiva para desarrollo local.
# - Los valores están hardcodeados intencionalmente para facilitar el onboarding.
# - security.jwt.secret DEBE coincidir con el valor de multitenancy (application.yaml).
# - En producción use application-prod.yml con variables de entorno/secretos.
# ---------------------------------------------------------------------------

# JWT unificado: mismo secreto que multitenancy para dev local
security:
  jwt:
    secret: dev-secret-change-me-dev-secret-change-me
    issuer: sgdea-multitenancy
