server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: apiGateway

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  graphql:
    http:
      path: /graphql   # spring.graphql.path → spring.graphql.http.path (Spring Boot 3.4+)

  # ── Docker Compose ──────────────────────────────────────────────────────────
  # Deshabilitado en la config base para evitar que Spring Boot busque
  # compose.yaml en el directorio de trabajo (puede no coincidir con apiGateway/).
  # Habilitarlo explícitamente en application-dev.yml con la ruta correcta.
  docker:
    compose:
      enabled: false

  # ── Redis — migrado a spring.data.redis.* (Spring Boot 3.x) ────────────────
  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:6379}
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2

  cloud:
    gateway:
      server:
        webflux:
          # HTTP client tuning — spring.cloud.gateway.httpclient.* →
          # spring.cloud.gateway.server.webflux.httpclient.* (Spring Cloud 2025.x)
          httpclient:
            connect-timeout: 5000
            response-timeout: 30s
            pool:
              type: ELASTIC
              max-connections: 500
              acquire-timeout: 45000

          # Filtros aplicados a TODAS las rutas:
          # X-Gateway-Source permite a los microservicios saber que la petición
          # fue validada por el Gateway y confiar en los headers X-User-*.
          default-filters:
            - AddRequestHeader=X-Gateway-Source, sgdea-gateway

          routes:
            # ── Administración ──────────────────────────────────────────────────
            - id: administracion
              uri: ${ADMIN_SERVICE_URL:http://localhost:9090}
              predicates:
                - Path=/administracion/**
              filters:
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: 20
                    redis-rate-limiter.burstCapacity: 40
                    redis-rate-limiter.requestedTokens: 1

            - id: administracion-graphql
              uri: ${ADMIN_SERVICE_URL:http://localhost:9090}
              predicates:
                - Path=/graphql
              filters:
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: 20
                    redis-rate-limiter.burstCapacity: 40
                    redis-rate-limiter.requestedTokens: 1

            # ── Multitenancy — Auth (rutas públicas) ────────────────────────────
            - id: multitenancy-auth
              uri: ${MULTITENANCY_SERVICE_URL:http://localhost:8081}
              predicates:
                - Path=/multitenancy/auth/**
              filters:
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: 5
                    redis-rate-limiter.burstCapacity: 10
                    redis-rate-limiter.requestedTokens: 1

            # ── Multitenancy — API (rutas protegidas con JWT) ───────────────────
            - id: multitenancy
              uri: ${MULTITENANCY_SERVICE_URL:http://localhost:8081}
              predicates:
                - Path=/multitenancy/**
              filters:
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: 20
                    redis-rate-limiter.burstCapacity: 40
                    redis-rate-limiter.requestedTokens: 1


  # OAuth2 client deshabilitado: el Gateway usa HMAC-SHA256 shared-secret JWT
  # (emitido por multitenancy). No se requiere proveedor OIDC externo.

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics,env,beans,loggers
      base-path: /actuator
  endpoint:
    health:
      show-details: always
    prometheus:
      # Spring Boot 3.4+: reemplaza 'enabled: true' — valores: unrestricted | read-only | none
      access: unrestricted
  # Zipkin tracing (Spring Boot 3.x — reemplaza spring.zipkin.base-url de 2.x)
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_URL:http://localhost:9411}/api/v2/spans
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true
      percentiles:
        http.server.requests: 0.5,0.95,0.99

logging:
  level:
    root: INFO
    com.sgdea: DEBUG

services:
  administracion:
    graphql-url: ${ADMIN_SERVICE_GRAPHQL_URL:http://localhost:9090/graphql}
  multitenancy:
    url: ${MULTITENANCY_SERVICE_URL:http://localhost:8081}

# ---------------------------------------------------------------------------
# Configuración JWT unificada — secreto compartido con el microservicio multitenancy.
# ---------------------------------------------------------------------------
security:
  jwt:
    secret: ${SECURITY_JWT_SECRET:dev-secret-change-me-dev-secret-change-me}
    issuer: ${SECURITY_JWT_ISSUER:sgdea-multitenancy}

# ---------------------------------------------------------------------------
# Notas:
# - Este archivo contiene la configuración BASE compartida por todos los perfiles.
# - Use application-dev.yml para sobreescrituras de desarrollo local.
# - Use application-prod.yml para sobreescrituras de producción.
# ---------------------------------------------------------------------------
