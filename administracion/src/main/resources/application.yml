server:
  port: 8082

spring:
  application:
    name: Administracion
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  datasource:
    # Valores por defecto para entorno de desarrollo local; en producción use variables de entorno
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/administracion}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:Tecs2026*}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    root: INFO
    com.sgdea: DEBUG
