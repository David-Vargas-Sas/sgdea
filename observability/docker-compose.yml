# ─────────────────────────────────────────────────────────────────────────────
# Stack de Observabilidad — SGDEA
# Incluye: Prometheus (scraping) + Grafana (dashboards)
#
# Uso en desarrollo:
#   cd observability
#   docker compose up -d
#
# URLs resultantes:
#   Prometheus : http://localhost:9090
#   Grafana    : http://localhost:3000  (admin / admin)
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Prometheus ────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: sgdea-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"     # Retención de 15 días
      - "--web.enable-lifecycle"                 # Permite reload sin reiniciar
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
    restart: unless-stopped
    networks:
      - observability

  # ── Grafana ───────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.0.0
    container_name: sgdea-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin        # Cambiar en producción
      GF_USERS_ALLOW_SIGN_UP: "false"
      # Provisionamiento automático de datasource Prometheus
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - observability

volumes:
  prometheus_data:
  grafana_data:

networks:
  observability:
    driver: bridge

