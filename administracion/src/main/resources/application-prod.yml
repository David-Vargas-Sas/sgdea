server:
  port: ${SERVER_PORT:9090}
  tomcat:
    threads:
      max: ${TOMCAT_MAX_THREADS:200}
      min-spare: ${TOMCAT_MIN_SPARE_THREADS:20}
    connection-timeout: 20000
    accept-count: 100

spring:
  profiles:
    active: prod
  application:
    name: administracion

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    hikari:
      # ── Pool FIJO — tamaño calculado con la fórmula de PostgreSQL ──────────
      #
      #   pool_size ≈ (núcleos_CPU × 2) + effective_spindle_drives
      #   SSD/NVMe → spindle = 1
      #
      #   Ejemplos:
      #     4 vCPUs + SSD  →  (4×2)+1  = 9  (óptimo DB-server)
      #     8 vCPUs + SSD  →  (8×2)+1  = 17
      #
      #   Con 200 hilos Tomcat, recomendamos HIKARI_POOL_SIZE = 25..50.
      #   Pool fijo (min = max): elimina overhead de crecimiento/contracción.
      #
      maximum-pool-size: ${HIKARI_POOL_SIZE:25}
      minimum-idle: ${HIKARI_POOL_SIZE:25}

      connection-timeout: 20000                     # 20 s
      validation-timeout: 3000                      # 3 s (< connection-timeout)
      max-lifetime: 1800000                         # 30 min
      idle-timeout: 600000                          # 10 min
      keepalive-time: 60000                         # Ping cada 60 s (imprescindible en cloud)
      leak-detection-threshold: ${HIKARI_LEAK_THRESHOLD:60000}  # 60 s en prod
      pool-name: AdministracionHikariPool

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate                            # Validar esquema, nunca modificar en prod
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        generate_statistics: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus     # SOLO estos tres en producción
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized         # Detalles solo para usuarios autenticados
    prometheus:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name:administracion}
    distribution:
      percentiles-histogram:
        http.server.requests: true
      percentiles:
        http.server.requests: 0.5,0.95,0.99

logging:
  level:
    root: INFO
    com.sgdea: INFO
    com.zaxxer.hikari: WARN

# ─────────────────────────────────────────────────────────────────────────────
# Variables de entorno requeridas en producción:
#   SPRING_DATASOURCE_URL               URL JDBC de PostgreSQL (OBLIGATORIO)
#   SPRING_DATASOURCE_USERNAME          Usuario de BD (OBLIGATORIO)
#   SPRING_DATASOURCE_PASSWORD          Contraseña de BD (OBLIGATORIO)
#   HIKARI_POOL_SIZE                    Conexiones BD (default: 25; fórmula: CPUs×2+1)
#   HIKARI_LEAK_THRESHOLD               ms antes de WARNING por fuga (default: 60000)
#   TOMCAT_MAX_THREADS                  Hilos Tomcat (default: 200)
#   TOMCAT_MIN_SPARE_THREADS            Hilos mínimos en espera (default: 20)
#   SERVER_PORT                         Puerto del servicio (default: 9090)
# ─────────────────────────────────────────────────────────────────────────────
